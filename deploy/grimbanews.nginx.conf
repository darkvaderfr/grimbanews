# GrimbaNews — nginx vhost
#
# Installed by deploy/bootstrap.sh at /etc/nginx/sites-available/grimbanews.
# NOT enabled by default. To activate (once DNS is pointing at this host):
#
#   ln -s /etc/nginx/sites-available/grimbanews /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d grimbanews.com -d www.grimbanews.com
#
# Certbot rewrites this file in place on first TLS issue — see
# NobuReach's config for the post-certbot shape. The HTTP server
# block below is the bare pre-TLS form.

server {
    listen 80;
    listen [::]:80;
    server_name grimbanews.com www.grimbanews.com;

    root /var/www/grimbanews/current/public;
    index index.php index.html;

    access_log /var/log/nginx/grimbanews.access.log;
    error_log  /var/log/nginx/grimbanews.error.log warn;

    # Max upload = admin image uploads for posts. Bump if Vader needs more.
    client_max_body_size 32M;

    # Content Security: basic hardening — the site itself sets richer
    # headers via Laravel middleware (see grimba-chrome layout). Keep
    # these minimal so we don't conflict.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Laravel front-controller pattern
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # Deny access to dotfiles and the obvious framework paths
    location ~ /\.(?!well-known) {
        deny all;
    }
    location ~ ^/(storage/(?!app/public)|bootstrap/cache|vendor|database|\.env) {
        deny all;
    }

    # Static asset caching — 30 days for anything under public/themes
    # (our CSS/JS/fonts), OG PNGs cached 7 days.
    location ~* ^/themes/.*\.(css|js|woff2|woff|ttf|otf|eot|svg)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    location ~* ^/og/ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # GrimbaOgImageController serves /og/home.png and /og/post/{id}.png
    # via Laravel — those need to hit PHP, not 404 on "file not found".
    # The try_files above already handles it, but spelling it out for
    # reviewers.

    # Gzip text responses
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain
        text/css
        text/xml
        application/xml
        application/rss+xml
        application/atom+xml
        application/json
        application/javascript
        image/svg+xml;
}
